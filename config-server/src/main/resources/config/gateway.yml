spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
#              uri: http://localhost:8081
              uri: lb://USER-SERVICE
              predicates:
              - Path=/api/users/**

            - id: product-service
#              uri: http://localhost:8082
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**

            - id: order-service
#              uri: http://localhost:8083
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/cart,/api/cart/**,/api/orders/**

            - id: eureka-server
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/main
              filters:
                - SetPath=/

            - id: eureka-server-static
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**



server:
  port: 8080

logging:
  level:
    root: info
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0




